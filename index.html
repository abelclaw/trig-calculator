<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Trig Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
        .container {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1400px;
            width: 100%;
        }
        .panel {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
        }
        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #38bdf8;
        }
        .calc-panel {
            flex: 0 0 360px;
            min-width: 340px;
            max-width: 400px;
        }
        .interactive-panel {
            flex: 1;
            min-width: 500px;
            max-width: 700px;
        }

        /* Calculator */
        .calc-display {
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: right;
            font-size: 1.8rem;
            font-family: 'Courier New', monospace;
            min-height: 60px;
            word-break: break-all;
            color: #f1f5f9;
        }
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .mode-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: 600;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .btn {
            padding: 12px 4px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        .btn:hover { background: #334155; }
        .btn:active { transform: scale(0.95); }
        .btn.trig { background: #1e3a5f; border-color: #2563eb; color: #93c5fd; }
        .btn.trig:hover { background: #1e40af; }
        .btn.inv-trig { background: #3b1f5e; border-color: #7c3aed; color: #c4b5fd; }
        .btn.inv-trig:hover { background: #5b21b6; }
        .btn.op { background: #0f172a; border-color: #475569; color: #f59e0b; }
        .btn.op:hover { background: #1e293b; }
        .btn.equals { background: #059669; border-color: #10b981; color: white; grid-column: span 2; }
        .btn.equals:hover { background: #047857; }
        .btn.clear { background: #991b1b; border-color: #dc2626; color: #fecaca; }
        .btn.clear:hover { background: #b91c1c; }

        /* Interactive canvases */
        .canvas-wrap {
            position: relative;
            margin-bottom: 16px;
        }
        .canvas-wrap canvas {
            width: 100%;
            background: #0f172a;
            border-radius: 10px;
            border: 1px solid #334155;
            display: block;
        }
        #triCircleCanvas {
            height: 360px;
            cursor: grab;
        }
        #triCircleCanvas.dragging {
            cursor: grabbing;
        }
        #wavesCanvas {
            height: 200px;
        }
        .drag-hint {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 0.75rem;
            color: #64748b;
            pointer-events: none;
        }

        /* Trig readout */
        .trig-readout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        .trig-readout .item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 12px;
        }
        .trig-readout .fn-name { color: #94a3b8; }
        .trig-readout .fn-val { color: #38bdf8; font-weight: 600; }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            font-size: 0.8rem;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-swatch {
            width: 20px;
            height: 4px;
            border-radius: 2px;
        }

        /* Unit circle mini */
        .unit-circle-wrap {
            text-align: center;
            margin-top: 16px;
        }
        #unitCircle {
            width: 100%;
            max-width: 280px;
            height: 280px;
            background: #0f172a;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .calc-panel, .interactive-panel { min-width: 100%; max-width: 100%; flex: 1; }
        }
    </style>
</head>
<body>
    <h1>Scientific Trig Calculator</h1>
    <p class="subtitle">Drag the point around the circle to explore trigonometric functions</p>

    <div class="container">
        <!-- Calculator Panel -->
        <div class="panel calc-panel">
            <h2>Calculator</h2>
            <div class="calc-display" id="display">0</div>
            <div class="mode-toggle">
                <button class="mode-btn active" id="degBtn" onclick="setMode('deg')">DEG</button>
                <button class="mode-btn" id="radBtn" onclick="setMode('rad')">RAD</button>
            </div>
            <div class="btn-grid">
                <button class="btn trig" onclick="trigFn('sin')">sin</button>
                <button class="btn trig" onclick="trigFn('cos')">cos</button>
                <button class="btn trig" onclick="trigFn('tan')">tan</button>
                <button class="btn clear" onclick="clearDisplay()">C</button>

                <button class="btn inv-trig" onclick="trigFn('asin')">sin⁻¹</button>
                <button class="btn inv-trig" onclick="trigFn('acos')">cos⁻¹</button>
                <button class="btn inv-trig" onclick="trigFn('atan')">tan⁻¹</button>
                <button class="btn" onclick="backspace()">&#x232B;</button>

                <button class="btn trig" onclick="trigFn('sec')">sec</button>
                <button class="btn trig" onclick="trigFn('csc')">csc</button>
                <button class="btn trig" onclick="trigFn('cot')">cot</button>
                <button class="btn op" onclick="appendOp('/')">&#xF7;</button>

                <button class="btn inv-trig" onclick="trigFn('asec')">sec⁻¹</button>
                <button class="btn inv-trig" onclick="trigFn('acsc')">csc⁻¹</button>
                <button class="btn inv-trig" onclick="trigFn('acot')">cot⁻¹</button>
                <button class="btn op" onclick="appendOp('*')">&#xD7;</button>

                <button class="btn" onclick="appendNum('7')">7</button>
                <button class="btn" onclick="appendNum('8')">8</button>
                <button class="btn" onclick="appendNum('9')">9</button>
                <button class="btn op" onclick="appendOp('-')">&#x2212;</button>

                <button class="btn" onclick="appendNum('4')">4</button>
                <button class="btn" onclick="appendNum('5')">5</button>
                <button class="btn" onclick="appendNum('6')">6</button>
                <button class="btn op" onclick="appendOp('+')">+</button>

                <button class="btn" onclick="appendNum('1')">1</button>
                <button class="btn" onclick="appendNum('2')">2</button>
                <button class="btn" onclick="appendNum('3')">3</button>
                <button class="btn op" onclick="appendNum('.')">.</button>

                <button class="btn" onclick="appendNum('(')">(</button>
                <button class="btn" onclick="appendNum('0')">0</button>
                <button class="btn" onclick="appendNum(')')">)</button>
                <button class="btn op" onclick="appendOp('^')">x&#x207F;</button>

                <button class="btn" onclick="appendNum(Math.PI.toString())">&#x3C0;</button>
                <button class="btn" onclick="appendNum(Math.E.toString())">e</button>
                <button class="btn equals" onclick="calculate()">=</button>
            </div>

            <div class="unit-circle-wrap">
                <h3 style="color:#818cf8; margin: 16px 0 8px;">Unit Circle</h3>
                <canvas id="unitCircle"></canvas>
            </div>
        </div>

        <!-- Interactive Triangle + Waves Panel -->
        <div class="panel interactive-panel">
            <h2>Interactive Triangle Explorer</h2>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-swatch" style="background:#a855f7;"></div>
                    <span style="color:#a855f7;">Hypotenuse (r=1)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background:#ef4444;"></div>
                    <span style="color:#ef4444;">Opposite = sin(&#x3B8;)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background:#38bdf8;"></div>
                    <span style="color:#38bdf8;">Adjacent = cos(&#x3B8;)</span>
                </div>
            </div>

            <div class="canvas-wrap">
                <canvas id="triCircleCanvas"></canvas>
                <div class="drag-hint">Drag the point</div>
            </div>

            <div class="canvas-wrap">
                <canvas id="wavesCanvas"></canvas>
            </div>

            <div class="trig-readout" id="trigReadout"></div>
        </div>
    </div>

    <script>
        // ===== CALCULATOR =====
        let expression = '';
        let angleMode = 'deg';
        const display = document.getElementById('display');

        function setMode(mode) {
            angleMode = mode;
            document.getElementById('degBtn').classList.toggle('active', mode === 'deg');
            document.getElementById('radBtn').classList.toggle('active', mode === 'rad');
        }

        function updateDisplay(val) { display.textContent = val || '0'; }
        function appendNum(n) { expression += n; updateDisplay(expression); }
        function appendOp(op) { expression += op; updateDisplay(expression); }
        function clearDisplay() { expression = ''; updateDisplay('0'); }
        function backspace() { expression = expression.slice(0, -1); updateDisplay(expression || '0'); }

        function toRad(deg) { return deg * Math.PI / 180; }
        function toDeg(rad) { return rad * 180 / Math.PI; }

        function trigFn(fn) {
            const numStr = expression || '0';
            let val = parseFloat(numStr);
            if (isNaN(val)) { updateDisplay('Error'); return; }
            let result;
            switch(fn) {
                case 'sin': result = Math.sin(angleMode === 'deg' ? toRad(val) : val); break;
                case 'cos': result = Math.cos(angleMode === 'deg' ? toRad(val) : val); break;
                case 'tan': result = Math.tan(angleMode === 'deg' ? toRad(val) : val); break;
                case 'asin':
                    if (val < -1 || val > 1) { updateDisplay('Error: domain'); return; }
                    result = Math.asin(val); if (angleMode === 'deg') result = toDeg(result); break;
                case 'acos':
                    if (val < -1 || val > 1) { updateDisplay('Error: domain'); return; }
                    result = Math.acos(val); if (angleMode === 'deg') result = toDeg(result); break;
                case 'atan':
                    result = Math.atan(val); if (angleMode === 'deg') result = toDeg(result); break;
                case 'sec': result = 1 / Math.cos(angleMode === 'deg' ? toRad(val) : val); break;
                case 'csc': result = 1 / Math.sin(angleMode === 'deg' ? toRad(val) : val); break;
                case 'cot': result = 1 / Math.tan(angleMode === 'deg' ? toRad(val) : val); break;
                case 'asec':
                    if (val > -1 && val < 1) { updateDisplay('Error: domain'); return; }
                    result = Math.acos(1/val); if (angleMode === 'deg') result = toDeg(result); break;
                case 'acsc':
                    if (val > -1 && val < 1) { updateDisplay('Error: domain'); return; }
                    result = Math.asin(1/val); if (angleMode === 'deg') result = toDeg(result); break;
                case 'acot':
                    result = Math.atan(1/val); if (angleMode === 'deg') result = toDeg(result); break;
            }
            expression = formatNum(result);
            updateDisplay(expression);
        }

        function formatNum(n) {
            if (!isFinite(n)) return 'Undefined';
            return Math.abs(n) < 1e-10 ? '0' : parseFloat(n.toPrecision(10)).toString();
        }

        function calculate() {
            try {
                let expr = expression.replace(/\^/g, '**');
                let result = Function('"use strict"; return (' + expr + ')')();
                expression = formatNum(result);
                updateDisplay(expression);
            } catch(e) {
                updateDisplay('Error');
                expression = '';
            }
        }

        // ===== INTERACTIVE TRIANGLE + WAVES =====
        let currentAngle = Math.PI / 6; // 30 degrees
        let isDragging = false;

        const triCanvas = document.getElementById('triCircleCanvas');
        const triCtx = triCanvas.getContext('2d');
        const wavesCanvas = document.getElementById('wavesCanvas');
        const wavesCtx = wavesCanvas.getContext('2d');

        // Colors
        const COL_HYP = '#a855f7';   // purple - hypotenuse
        const COL_SIN = '#ef4444';   // red - opposite/sin
        const COL_COS = '#38bdf8';   // cyan - adjacent/cos
        const COL_ARC = '#fbbf24';   // yellow - angle arc
        const COL_GRID = '#1e293b';
        const COL_AXIS = '#475569';
        const COL_TEXT = '#94a3b8';

        function resizeCanvas(canvas) {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.getContext('2d').scale(dpr, dpr);
            return { w: rect.width, h: rect.height };
        }

        // ---- Triangle / Unit Circle ----
        function getTriCircleLayout(w, h) {
            const r = Math.min(w, h) * 0.34;
            const cx = w * 0.42;
            const cy = h * 0.52;
            return { cx, cy, r };
        }

        function drawTriCircle() {
            const { w, h } = resizeCanvas(triCanvas);
            const ctx = triCtx;
            const { cx, cy, r } = getTriCircleLayout(w, h);
            const a = currentAngle;
            const sinA = Math.sin(a);
            const cosA = Math.cos(a);

            // Point on circle
            const px = cx + r * cosA;
            const py = cy - r * sinA;
            // Foot of perpendicular
            const fx = cx + r * cosA;
            const fy = cy;

            // Unit circle
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Axes
            ctx.strokeStyle = COL_AXIS;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx - r - 30, cy); ctx.lineTo(cx + r + 30, cy);
            ctx.moveTo(cx, cy - r - 30); ctx.lineTo(cx, cy + r + 30);
            ctx.stroke();

            // Axis labels
            ctx.font = '12px system-ui';
            ctx.fillStyle = COL_TEXT;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('1', cx + r, cy + 6);
            ctx.fillText('-1', cx - r, cy + 6);
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';
            ctx.fillText('1', cx + 6, cy - r);
            ctx.fillText('-1', cx + 6, cy + r);

            // Triangle fill
            ctx.beginPath();
            ctx.moveTo(cx, cy); ctx.lineTo(fx, fy); ctx.lineTo(px, py); ctx.closePath();
            ctx.fillStyle = 'rgba(168, 85, 247, 0.06)';
            ctx.fill();

            // Adjacent (cos) - horizontal line
            ctx.beginPath();
            ctx.moveTo(cx, cy); ctx.lineTo(fx, cy);
            ctx.strokeStyle = COL_COS;
            ctx.lineWidth = 4;
            ctx.stroke();

            // Opposite (sin) - vertical line
            ctx.beginPath();
            ctx.moveTo(fx, cy); ctx.lineTo(px, py);
            ctx.strokeStyle = COL_SIN;
            ctx.lineWidth = 4;
            ctx.stroke();

            // Hypotenuse - diagonal
            ctx.beginPath();
            ctx.moveTo(cx, cy); ctx.lineTo(px, py);
            ctx.strokeStyle = COL_HYP;
            ctx.lineWidth = 3;
            ctx.stroke();

            // Right angle square
            if (Math.abs(cosA) > 0.05 && Math.abs(sinA) > 0.05) {
                const sq = 10;
                const dirX = cosA > 0 ? -1 : 1;
                const dirY = sinA > 0 ? 1 : -1;
                ctx.beginPath();
                ctx.moveTo(fx + dirX * sq, fy);
                ctx.lineTo(fx + dirX * sq, fy + dirY * sq);
                ctx.lineTo(fx, fy + dirY * sq);
                ctx.strokeStyle = COL_AXIS;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            // Angle arc
            ctx.beginPath();
            ctx.arc(cx, cy, 28, 0, -a, true);
            ctx.strokeStyle = COL_ARC;
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // Angle label
            const angleDeg = toDeg(a);
            const labelA = a / 2;
            ctx.font = 'bold 14px system-ui';
            ctx.fillStyle = COL_ARC;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(
                `${angleDeg.toFixed(1)}°`,
                cx + 36 * Math.cos(labelA),
                cy - 36 * Math.sin(labelA)
            );

            // Draggable point
            ctx.beginPath();
            ctx.arc(px, py, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#f1f5f9';
            ctx.fill();
            ctx.strokeStyle = COL_HYP;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Inner dot
            ctx.beginPath();
            ctx.arc(px, py, 4, 0, Math.PI * 2);
            ctx.fillStyle = COL_HYP;
            ctx.fill();

            // Value labels on the edges
            ctx.font = 'bold 13px Courier New, monospace';

            // cos value along bottom
            ctx.fillStyle = COL_COS;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            const cosLabel = cosA.toFixed(3);
            ctx.fillText(cosLabel, (cx + fx) / 2, cy + 8);

            // sin value along right side
            ctx.fillStyle = COL_SIN;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const sinLabel = sinA.toFixed(3);
            ctx.fillText(sinLabel, fx + 8, (cy + py) / 2);

            // Coordinates at point
            ctx.font = '12px system-ui';
            ctx.fillStyle = '#e2e8f0';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText(`(${cosA.toFixed(2)}, ${sinA.toFixed(2)})`, px + 14, py - 4);

            // Connecting line from sin to waves canvas (visual bridge)
            // Draw small arrows/dots at the right edge showing sin and cos values
            const rightEdge = w - 16;
            const sinY = cy - sinA * r;
            const cosY = cy - cosA * r;

            // Dashed guide lines from triangle to right edge
            ctx.setLineDash([4, 4]);
            ctx.lineWidth = 1;

            // sin guide
            ctx.beginPath();
            ctx.moveTo(px, py); ctx.lineTo(rightEdge, sinY);
            ctx.strokeStyle = COL_SIN + '60';
            ctx.stroke();

            // cos guide
            ctx.beginPath();
            ctx.moveTo(fx, cy); ctx.lineTo(rightEdge, cosY);
            ctx.strokeStyle = COL_COS + '60';
            ctx.stroke();

            ctx.setLineDash([]);

            // Endpoint dots on right edge
            ctx.beginPath();
            ctx.arc(rightEdge, sinY, 5, 0, Math.PI * 2);
            ctx.fillStyle = COL_SIN;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(rightEdge, cosY, 5, 0, Math.PI * 2);
            ctx.fillStyle = COL_COS;
            ctx.fill();
        }

        // ---- Sine & Cosine Waves ----
        function drawWaves() {
            const { w, h } = resizeCanvas(wavesCanvas);
            const ctx = wavesCtx;
            const a = currentAngle;

            const pad = { left: 45, right: 20, top: 20, bottom: 28 };
            const plotW = w - pad.left - pad.right;
            const plotH = h - pad.top - pad.bottom;
            const midY = pad.top + plotH / 2;

            // Grid lines
            ctx.strokeStyle = COL_GRID;
            ctx.lineWidth = 1;
            // Horizontal: -1, 0, 1
            for (let v = -1; v <= 1; v++) {
                const y = midY - v * (plotH / 2);
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
            }

            // Vertical: every 90 degrees
            ctx.font = '11px system-ui';
            ctx.fillStyle = COL_TEXT;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let deg = 0; deg <= 360; deg += 90) {
                const x = pad.left + (deg / 360) * plotW;
                ctx.beginPath();
                ctx.moveTo(x, pad.top);
                ctx.lineTo(x, h - pad.bottom);
                ctx.strokeStyle = COL_GRID;
                ctx.stroke();
                ctx.fillText(deg + '\u00B0', x, h - pad.bottom + 6);
            }

            // Y-axis labels
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText('1', pad.left - 8, pad.top);
            ctx.fillText('0', pad.left - 8, midY);
            ctx.fillText('-1', pad.left - 8, h - pad.bottom);

            // Axis line
            ctx.beginPath();
            ctx.moveTo(pad.left, midY);
            ctx.lineTo(w - pad.right, midY);
            ctx.strokeStyle = COL_AXIS;
            ctx.lineWidth = 1;
            ctx.stroke();

            // Draw sin wave
            ctx.beginPath();
            for (let i = 0; i <= plotW; i++) {
                const angle = (i / plotW) * Math.PI * 2;
                const y = midY - Math.sin(angle) * (plotH / 2);
                if (i === 0) ctx.moveTo(pad.left + i, y);
                else ctx.lineTo(pad.left + i, y);
            }
            ctx.strokeStyle = COL_SIN;
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // Draw cos wave
            ctx.beginPath();
            for (let i = 0; i <= plotW; i++) {
                const angle = (i / plotW) * Math.PI * 2;
                const y = midY - Math.cos(angle) * (plotH / 2);
                if (i === 0) ctx.moveTo(pad.left + i, y);
                else ctx.lineTo(pad.left + i, y);
            }
            ctx.strokeStyle = COL_COS;
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // Current angle vertical line
            const normalizedAngle = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const curX = pad.left + (normalizedAngle / (Math.PI * 2)) * plotW;

            ctx.beginPath();
            ctx.moveTo(curX, pad.top);
            ctx.lineTo(curX, h - pad.bottom);
            ctx.strokeStyle = COL_ARC + '80';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Sin dot
            const sinVal = Math.sin(a);
            const sinDotY = midY - sinVal * (plotH / 2);
            ctx.beginPath();
            ctx.arc(curX, sinDotY, 8, 0, Math.PI * 2);
            ctx.fillStyle = COL_SIN;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Cos dot
            const cosVal = Math.cos(a);
            const cosDotY = midY - cosVal * (plotH / 2);
            ctx.beginPath();
            ctx.arc(curX, cosDotY, 8, 0, Math.PI * 2);
            ctx.fillStyle = COL_COS;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Value labels next to dots
            ctx.font = 'bold 12px Courier New, monospace';
            ctx.textBaseline = 'middle';

            // sin label
            ctx.fillStyle = COL_SIN;
            const sinLabelX = curX + 14;
            const sinLabelSide = sinLabelX + 60 > w ? curX - 14 : sinLabelX;
            ctx.textAlign = sinLabelX + 60 > w ? 'right' : 'left';
            ctx.fillText(`sin ${sinVal.toFixed(3)}`, sinLabelSide, sinDotY);

            // cos label (offset vertically if too close to sin)
            ctx.fillStyle = COL_COS;
            let cosLabelY = cosDotY;
            if (Math.abs(sinDotY - cosDotY) < 20) {
                cosLabelY = cosDotY + (cosDotY > sinDotY ? 18 : -18);
            }
            const cosLabelX = curX + 14;
            const cosLabelSide = cosLabelX + 60 > w ? curX - 14 : cosLabelX;
            ctx.textAlign = cosLabelX + 60 > w ? 'right' : 'left';
            ctx.fillText(`cos ${cosVal.toFixed(3)}`, cosLabelSide, cosLabelY);

            // Wave labels
            ctx.font = 'bold 13px system-ui';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillStyle = COL_SIN;
            ctx.fillText('sin(\u03B8)', pad.left + 4, pad.top + 2);
            ctx.fillStyle = COL_COS;
            ctx.fillText('cos(\u03B8)', pad.left + 60, pad.top + 2);
        }

        // ---- Trig Readout ----
        function updateReadout() {
            const a = currentAngle;
            const deg = toDeg(a);
            const sinA = Math.sin(a);
            const cosA = Math.cos(a);
            const tanA = Math.tan(a);

            const items = [
                { name: '\u03B8', val: `${deg.toFixed(1)}\u00B0 (${a.toFixed(4)} rad)` },
                { name: 'sin(\u03B8)', val: sinA.toFixed(6) },
                { name: 'cos(\u03B8)', val: cosA.toFixed(6) },
                { name: 'tan(\u03B8)', val: Math.abs(tanA) > 1e6 ? 'Undefined' : tanA.toFixed(6) },
                { name: 'csc(\u03B8)', val: Math.abs(sinA) < 1e-10 ? 'Undefined' : (1/sinA).toFixed(6) },
                { name: 'sec(\u03B8)', val: Math.abs(cosA) < 1e-10 ? 'Undefined' : (1/cosA).toFixed(6) },
            ];

            document.getElementById('trigReadout').innerHTML = items.map(i =>
                `<div class="item"><span class="fn-name">${i.name}</span> = <span class="fn-val">${i.val}</span></div>`
            ).join('');
        }

        // ---- Drag Interaction ----
        function getCanvasPos(e) {
            const rect = triCanvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        }

        function posToAngle(pos) {
            const rect = triCanvas.getBoundingClientRect();
            const { cx, cy } = getTriCircleLayout(rect.width, rect.height);
            const dx = pos.x - cx;
            const dy = -(pos.y - cy); // flip y
            let angle = Math.atan2(dy, dx);
            // Keep angle in [0, 2pi)
            if (angle < 0) angle += Math.PI * 2;
            return angle;
        }

        function isNearPoint(pos) {
            const rect = triCanvas.getBoundingClientRect();
            const { cx, cy, r } = getTriCircleLayout(rect.width, rect.height);
            const px = cx + r * Math.cos(currentAngle);
            const py = cy - r * Math.sin(currentAngle);
            const dx = pos.x - px;
            const dy = pos.y - py;
            return dx * dx + dy * dy < 400; // 20px radius
        }

        function onPointerDown(e) {
            const pos = getCanvasPos(e);
            if (isNearPoint(pos)) {
                isDragging = true;
                triCanvas.classList.add('dragging');
                e.preventDefault();
            }
        }

        function onPointerMove(e) {
            if (!isDragging) {
                // Change cursor near point
                const pos = getCanvasPos(e);
                triCanvas.style.cursor = isNearPoint(pos) ? 'grab' : 'default';
                return;
            }
            e.preventDefault();
            const pos = getCanvasPos(e);
            currentAngle = posToAngle(pos);
            redraw();
        }

        function onPointerUp() {
            isDragging = false;
            triCanvas.classList.remove('dragging');
        }

        // Mouse events
        triCanvas.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);

        // Touch events
        triCanvas.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const pos = getCanvasPos(e);
            currentAngle = posToAngle(pos);
            redraw();
        }, { passive: false });
        window.addEventListener('touchend', onPointerUp);

        // ---- Redraw all ----
        function redraw() {
            drawTriCircle();
            drawWaves();
            updateReadout();
        }

        // ===== UNIT CIRCLE (calculator panel) =====
        function drawUnitCircle() {
            const canvas = document.getElementById('unitCircle');
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const w = rect.width, h = rect.height;

            const cx = w / 2, cy = h / 2;
            const r = Math.min(w, h) * 0.38;

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx - r - 20, cy); ctx.lineTo(cx + r + 20, cy);
            ctx.moveTo(cx, cy - r - 20); ctx.lineTo(cx, cy + r + 20);
            ctx.stroke();

            const angles = [0, 30, 45, 60, 90, 120, 135, 150, 180, 210, 225, 240, 270, 300, 315, 330];
            ctx.font = '11px monospace';

            angles.forEach(deg => {
                const rad = toRad(deg);
                const x = cx + r * Math.cos(rad);
                const y = cy - r * Math.sin(rad);
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#f59e0b';
                ctx.fill();

                const lx = cx + (r + 22) * Math.cos(rad);
                const ly = cy - (r + 22) * Math.sin(rad);
                ctx.fillStyle = '#94a3b8';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(deg + '\u00B0', lx, ly);
            });

            ctx.fillStyle = '#e2e8f0';
            ctx.font = 'bold 14px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('1', cx + r + 8, cy + 16);
            ctx.fillText('-1', cx - r - 12, cy + 16);
            ctx.fillText('1', cx + 10, cy - r - 8);
            ctx.fillText('-1', cx + 14, cy + r + 16);
        }

        // ===== INIT =====
        window.addEventListener('load', () => {
            drawUnitCircle();
            redraw();
        });
        window.addEventListener('resize', () => {
            drawUnitCircle();
            redraw();
        });
    </script>
</body>
</html>
